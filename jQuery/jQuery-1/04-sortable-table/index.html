<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Сортировка таблицы</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <table>
        <thead>
            <tr>
                <th data-col="name">Имя</th>
                <th data-col="age">Возраст</th>
                <th data-col="role">Должность</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Анна</td>
                <td>28</td>
                <td>Дизайнер</td>
            </tr>
            <tr>
                <td>Борис</td>
                <td>34</td>
                <td>Бэкенд</td>
            </tr>
            <tr>
                <td>Виктор</td>
                <td>25</td>
                <td>Фронтенд</td>
            </tr>
            <tr>
                <td>Галина</td>
                <td>41</td>
                <td>Менеджер</td>
            </tr>
        </tbody>
    </table>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
